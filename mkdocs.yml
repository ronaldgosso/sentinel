site_name: Sentinel
site_description: AI-powered security hardening for Python developers
site_url: https://ronaldgosso.github.io/sentinel
repo_url: https://github.com/ronaldgosso/sentinel
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quickstart: quickstart.md
  - Usage:
      - Command Reference: usage.md
      - Configuration: configuration.md
      - AI Integration: ai-integration.md
      - CI/CD: ci-cd.md
  - Contributing:
      - Contributing Guide: contributing.md
      - Architecture: architecture.md
  - FAQ: faq.md
  - Roadmap: roadmap.md
