repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]
  - repo: local
    hooks:
      - id: sentinel-self-scan
        name: Sentinel self-scan
        entry: sentinel --ci .
        language: system
        pass_filenames: false
        stages: [manual]